[build]
  command = "npm --prefix client run build"
  publish = "client/dist"
  functions = "netlify/functions"

[dev]
  command = "npm --prefix client run dev"
  targetPort = 5174
  publish = "client/dist"
  functions = "netlify/functions"

# SPA fallback: client-side routes (e.g. /players, /trade-analyzer) have no matching
# static file, so serve index.html and let React Router handle them. Function paths
# (/api/*) are matched before redirects, so this doesn't shadow the API.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
